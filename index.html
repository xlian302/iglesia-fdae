<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IGLESIA FDAE</title>

<link href="https://fonts.googleapis.com/css2?family=Merriweather&display=swap" rel="stylesheet">

<style>
body{
    background:#000;
    color:white;
    font-family:'Merriweather', serif;
    text-align:center;
}

.header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.logo{
    width:70px;
    height:70px;
}

.pantalla{ display:none; padding:40px; }
.activo{ display:block; }

.menu{
    display:flex;
    justify-content:center;
    gap:25px;
    margin-top:40px;
}

.btn-grande{
    width:220px;
    height:220px;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
    transition:0.3s;
}

.btn-grande:hover{ transform:scale(1.05); }

.b-azul{background:#3498db;}
.b-verde{background:#2ecc71;}
.b-naranja{background:#e67e22;}

input, button{
    padding:12px;
    border-radius:10px;
    border:none;
    margin:10px;
    font-size:18px;
}

#visor-b, #visor-h{
    margin-top:20px;
    max-width:900px;
    margin:auto;
}

.versiculo{
    margin:10px;
    padding:15px;
    background:#111;
    border-left:5px solid #3498db;
    border-radius:10px;
    text-align:left;
}

.num{ color:#3498db; font-weight:bold; }

.error{ color:#ff4d4d; }

#visor-pdf{
    width:90%;
    height:500px;
    border:none;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="p-inicio" class="pantalla activo">

<div class="header">
<img src="logo.png" class="logo">
<h1>IGLESIA EVANGÉLICA MISIONERA FDAE</h1>
</div>

<div class="menu">
<div class="btn-grande b-azul" onclick="irA('p-biblia')">📖<br>BIBLIA</div>
<div class="btn-grande b-verde" onclick="irA('p-himno')">🎵<br>HIMNARIO</div>
<div class="btn-grande b-naranja" onclick="irA('p-predica')">📺<br>PRESENTACIÓN</div>
</div>
</div>

<!-- BIBLIA -->
<div id="p-biblia" class="pantalla">
<button onclick="irA('p-inicio')">← VOLVER</button>
<h2>BIBLIA RV1960</h2>

<input id="f-libro" placeholder="Libro (genesis)">
<input id="f-cap" placeholder="Capítulo">
<button onclick="buscar()">BUSCAR</button>

<div id="visor-b"></div>
</div>

<!-- HIMNARIO -->
<div id="p-himno" class="pantalla">
<button onclick="irA('p-inicio')">← VOLVER</button>
<h2>HIMNARIO</h2>

<input id="h-num" placeholder="Número">
<button onclick="buscarHimno()">BUSCAR</button>

<div id="visor-h"></div>
</div>

<!-- PRESENTACIÓN -->
<div id="p-predica" class="pantalla">
<button onclick="irA('p-inicio')">← VOLVER</button>
<h2>PRESENTACIÓN</h2>

<p>Sube tus diapositivas (PDF recomendado):</p>

<input type="file" id="archivo" accept=".pdf,.ppt,.pptx">

<br>
<button onclick="cargarArchivo()">MOSTRAR</button>

<div id="visor-container">
<iframe id="visor-pdf"></iframe>
</div>

<div id="mensaje"></div>
</div>

<script>

/* navegación */
function irA(id){
document.querySelectorAll('.pantalla').forEach(p=>p.classList.remove('activo'));
document.getElementById(id).classList.add('activo');
}

/* ================= BIBLIA ================= */
let BIBLIA = {};

async function cargarBiblia(){
    try{
        const res = await fetch("https://xlian302.github.io/iglesia-fdae/rv1960.json");
        if(!res.ok) throw new Error();
        BIBLIA = await res.json();
        console.log("Biblia cargada");
    }catch{
        document.getElementById("visor-b").innerHTML =
        "<div class='error'>❌ Error cargando Biblia</div>";
    }
}

function buscar(){
let visor = document.getElementById("visor-b");
let libro = document.getElementById("f-libro").value.toLowerCase().trim();
let cap = document.getElementById("f-cap").value.trim();

if(!BIBLIA[libro]) return visor.innerHTML="❌ Libro no encontrado";
if(!BIBLIA[libro][cap]) return visor.innerHTML="❌ Capítulo no encontrado";

let html="";
for(let v in BIBLIA[libro][cap]){
    html+=`<div class="versiculo"><span class="num">${v}</span>${BIBLIA[libro][cap][v]}</div>`;
}
visor.innerHTML=html;
}

/* ================= HIMNOS ================= */
let HIMNOS = {};

async function cargarHimnos(){
    try{
        const res = await fetch("https://xlian302.github.io/iglesia-fdae/himnos.json");
        if(!res.ok) throw new Error();
        HIMNOS = await res.json();
    }catch{
        document.getElementById("visor-h").innerHTML =
        "<div class='error'>❌ Error cargando himnos</div>";
    }
}

function buscarHimno(){
let num = document.getElementById("h-num").value;
let visor = document.getElementById("visor-h");

if(!HIMNOS[num]) return visor.innerHTML="❌ No encontrado";

let h = HIMNOS[num];
visor.innerHTML = `<h3>${h.titulo}</h3><p style="white-space:pre-line;">${h.letra}</p>`;
}

/* ================= PRESENTACIÓN ================= */
function cargarArchivo(){
let archivo = document.getElementById("archivo").files[0];
let visor = document.getElementById("visor-pdf");
let mensaje = document.getElementById("mensaje");

if(!archivo) return alert("Selecciona un archivo");

let tipo = archivo.type;

if(tipo === "application/pdf"){
    let url = URL.createObjectURL(archivo);
    visor.src = url;
    mensaje.innerHTML = "";
}else{
    visor.src = "";
    mensaje.innerHTML = "⚠️ PowerPoint no se puede mostrar aquí. Usa PDF o ábrelo manualmente.";
}
}

/* INICIO */
async function iniciar(){
    await cargarBiblia();
    await cargarHimnos();
}
iniciar();

</script>

</body>
</html>
